version: '3.8'

services:
  # Payment Gateway Services
  gateway-backend:
    build: ./gateway-backend
    container_name: gateway-backend
    environment:
      - PORT=5000
      - MONGO_URI=mongodb://mongo:27017/payment-gateway
      - BACKEND_PRIVATE_KEY=${BACKEND_PRIVATE_KEY}
    depends_on:
      - mongo
    networks:
      - app-network

  gateway-frontend:
    build: ./gateway-frontend
    container_name: gateway-frontend
    environment:
      - VITE_API_URL=/api/gateway
    networks:
      - app-network

  # Onboarding Platform Services
  onboarding-backend:
    build: ./onboarding-backend
    container_name: onboarding-backend
    environment:
      - PORT=5000
      - MONGO_URI=mongodb://mongo:27017/social-onboarding
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
    depends_on:
      - mongo
    networks:
      - app-network

  onboarding-frontend:
    build: ./onboarding-frontend
    container_name: onboarding-frontend
    environment:
      - VITE_API_URL=/api/onboarding
    networks:
      - app-network

  # Database
  mongo:
    image: mongo:latest
    container_name: mongo
    ports:
      - "27018:27017"
    volumes:
      - mongo-data:/data/db
    networks:
      - app-network

  # Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: nginx
    ports:
      - "80:80"
      - "8080:8080"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - gateway-frontend
      - gateway-backend
      - onboarding-frontend
      - onboarding-backend
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  mongo-data:

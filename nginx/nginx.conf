server {
    listen 80;
    server_name localhost;

    # Onboarding Frontend (Root)
    location / {
        proxy_pass http://onboarding-frontend:5174;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
    }

    # WebSocket (Socket.io) for Payment Gateway
    location /socket.io/ {
        proxy_pass http://gateway-backend:5000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
    }

    # Onboarding Backend API
    location /api/onboarding {
        rewrite ^/api/onboarding/(.*) /api/$1 break;
        proxy_pass http://onboarding-backend:5000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }

    # Onboarding Auth Routes
    location /auth {
        proxy_pass http://onboarding-backend:5000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
    }

    # Payment Gateway Backend API (proxied so payment page can fetch invoices)
    location /api/gateway {
        rewrite ^/api/gateway/(.*) /api/$1 break;
        proxy_pass http://gateway-backend:5000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }
}

